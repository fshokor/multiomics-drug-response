name: multiomics
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip

  # Jupyter only — everything else comes via pip below.
  # Conda must NOT pre-install numpy/pandas/scipy here: doing so installs
  # an unpinned numpy, and the later `pip install drevalpy` silently
  # downgrades it, which is what broke the last environment.
  - jupyter
  - ipykernel
  - ipywidgets

  - pip:
    # drevalpy FIRST, unconstrained — let it pull its own compatible
    # numpy/scikit-learn/torch versions. Everything after this must be
    # compatible with whatever drevalpy pins; do not pip install numpy
    # or torch separately before this line.
    # - drevalpy

    # PyTorch Geometric — installed after torch is already resolved by drevalpy
    - torch
    - torch-geometric

    # Biology / chemistry
    - rdkit
    - chembl-webresource-client
    - mygene

    # Core data science (will reuse drevalpy's numpy/pandas/scipy/sklearn
    # pins instead of overriding them, as long as no version is specified here)
    - matplotlib
    - seaborn
    - plotly
    - pyyaml
    - tqdm
    - requests

    # Misc
    - pyarrow        # parquet support
    - openpyxl       # Excel support if needed
